<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ms. Murphy APUSH — Jeopardy!</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#060CE9;color:#fff;min-height:100vh;padding:16px}
  h1{text-align:center;font-size:28px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;color:#FFD700;text-shadow:2px 2px 0 #000}
  .subtitle{text-align:center;font-size:13px;color:#aac8ff;margin-bottom:16px;letter-spacing:1px}
  .score-bar{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .score-card{background:#0a1fa8;border:2px solid #FFD700;border-radius:8px;padding:8px 14px;text-align:center;min-width:100px}
  .score-val{font-size:22px;font-weight:700;color:#FFD700;font-family:Arial,sans-serif}
  .score-btns{display:flex;gap:4px;margin-top:5px;justify-content:center}
  .score-btns button{font-size:11px;padding:3px 7px;border:1px solid #FFD700;background:transparent;border-radius:4px;cursor:pointer;color:#FFD700;font-family:Arial,sans-serif}
  .score-btns button:hover{background:#FFD700;color:#000}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:900px;margin:0 auto 16px}
  .cat-header{background:#0a1fa8;border:2px solid #FFD700;border-radius:6px;padding:10px 6px;text-align:center;font-size:13px;font-weight:700;text-transform:uppercase;line-height:1.3;min-height:60px;display:flex;align-items:center;justify-content:center;color:#FFD700;letter-spacing:.5px}
  .cell{background:#0a1fa8;border:2px solid #5577ee;border-radius:6px;padding:8px 4px;text-align:center;font-size:22px;font-weight:700;cursor:pointer;min-height:60px;display:flex;align-items:center;justify-content:center;color:#FFD700;transition:background .15s,transform .1s;font-family:Arial,sans-serif}
  .cell:hover{background:#1a3aff;transform:scale(1.03)}
  .cell.used{background:#04086b;border-color:#1a2577;color:transparent;cursor:default;pointer-events:none}
  .cell.daily-double{background:#7a3800;border-color:#FFD700;color:#FFD700}
  .cell.daily-double:hover{background:#a85000}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#0a1fa8;border:3px solid #FFD700;border-radius:12px;padding:28px;max-width:580px;width:100%;position:relative;animation:popIn .2s ease}
  @keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-cat{font-size:12px;font-weight:700;color:#aac8ff;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:Arial,sans-serif}
  .modal-pts{font-size:15px;color:#FFD700;margin-bottom:14px;font-weight:700;font-family:Arial,sans-serif}
  .dd-banner{background:#7a3800;border:1px solid #FFD700;border-radius:6px;padding:8px 12px;font-size:13px;color:#FFD700;margin-bottom:12px;font-family:Arial,sans-serif}
  .modal-q{font-size:20px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:18px;text-align:center;font-family:Georgia,serif}
  .modal-ans{display:none;background:#003300;border:2px solid #00aa44;border-radius:8px;padding:12px 16px;font-size:15px;color:#66ff88;margin-bottom:16px;font-weight:700;font-family:Arial,sans-serif;text-align:center}
  .modal-ans.show{display:block}
  .btn-section{margin-bottom:10px}
  .btn-section-label{font-size:11px;color:#aac8ff;margin-bottom:5px;font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.05em}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap}
  .btn-row button{padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:Arial,sans-serif;transition:background .1s}
  .btn-reveal{border:2px solid #FFD700;background:transparent;color:#FFD700}
  .btn-reveal:hover{background:#FFD700;color:#000}
  .btn-correct{border:2px solid #00aa44;background:transparent;color:#66ff88}
  .btn-correct:hover{background:#00aa44;color:#fff}
  .btn-wrong{border:2px solid #cc2222;background:transparent;color:#ff7777}
  .btn-wrong:hover{background:#cc2222;color:#fff}
  .btn-close{border:2px solid #5577ee;background:transparent;color:#aac8ff}
  .btn-close:hover{background:#5577ee;color:#fff}
  .score-name-input{font-size:12px;color:#FFD700;background:transparent;border:none;border-bottom:1px solid #FFD700;text-align:center;width:80px;outline:none;font-family:Arial,sans-serif;cursor:pointer}
  #final-screen{display:none;text-align:center;padding:2rem;max-width:600px;margin:0 auto}
  #final-screen h2{font-size:32px;font-weight:700;color:#FFD700;margin-bottom:.5rem;text-shadow:2px 2px 0 #000}
  .winner-name{font-size:36px;font-weight:700;color:#fff;margin-bottom:.25rem;text-shadow:2px 2px 0 #000}
  .final-scores{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:1.5rem 0}
  .final-sc{background:#0a1fa8;border:2px solid #FFD700;border-radius:8px;padding:12px 20px;text-align:center}
  .reset-btn{padding:10px 24px;border-radius:8px;border:2px solid #FFD700;background:transparent;cursor:pointer;font-size:15px;color:#FFD700;font-weight:700;font-family:Arial,sans-serif}
  .reset-btn:hover{background:#FFD700;color:#000}
</style>
</head>
<body>

<p style="text-align:center;font-size:13px;color:#aac8ff;letter-spacing:2px;text-transform:uppercase;font-family:Arial,sans-serif;margin-bottom:2px">Ms. Murphy · APUSH</p>
<h1>Jeopardy!</h1>
<p class="subtitle">Chapter 32A — The New Left, Counterculture &amp; Civil Rights Movements</p>

<div class="score-bar" id="score-bar"></div>
<div id="main"><div class="board" id="board"></div></div>

<div id="final-screen">
  <h2>Game Over!</h2>
  <div class="winner-name" id="winner-name"></div>
  <div style="font-size:16px;color:#aac8ff;margin-bottom:.5rem;font-family:Arial,sans-serif">wins!</div>
  <div class="final-scores" id="final-scores"></div>
  <button class="reset-btn" onclick="resetGame()">Play Again</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-cat" id="m-cat"></div>
    <div class="modal-pts" id="m-pts"></div>
    <div class="dd-banner" id="m-dd" style="display:none">Daily Double! Teams agree on a wager before the question is revealed.</div>
    <div class="modal-q" id="m-q"></div>
    <div class="modal-ans" id="m-ans"></div>
    <div class="btn-section">
      <div class="btn-section-label">Controls</div>
      <div class="btn-row">
        <button class="btn-reveal" onclick="revealAns()">Reveal Answer</button>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
    <div class="btn-section" id="award-section"></div>
  </div>
</div>

<script>
const TEAM_NAMES = ["Team 1","Team 2","Team 3","Team 4","Team 5"];
const scores = {};
const used = new Set();
TEAM_NAMES.forEach(t => scores[t] = 0);

const DATA = [
  {
    cat:"Counterculture",
    qs:[
      {q:"What was the counterculture movement primarily known for rejecting?",a:"Mainstream American values and materialism.",pts:100},
      {q:"Which music festival, held in 1969, became a symbol of the counterculture movement?",a:"Woodstock.",pts:200},
      {q:"Which group of people was central to the counterculture, known for their long hair, unconventional fashion, and opposition to the Vietnam War?",a:"Hippies.",pts:300},
      {q:"Which drug, widely associated with the counterculture movement, was popularized for its hallucinogenic effects and became a symbol of rebellion in the 1960s?",a:"LSD.",pts:400},
      {q:"The 'Free Speech Movement' originated at which university in 1964, marking a key moment in the rise of student-led counterculture activism?",a:"University of California, Berkeley.",pts:500}
    ]
  },
  {
    cat:"Key Terms",
    qs:[
      {q:"Which law, passed in 1965, aimed to eliminate voting restrictions based on race?",a:"Voting Rights Act of 1965.",pts:100},
      {q:"What term refers to the government's attempt to 'assimilate' Native Americans by terminating tribal lands and sovereignty in the mid-20th century?",a:"Termination Policy.",pts:200},
      {q:"Which policy, implemented in the 1950s, required Native Americans to abandon their traditional cultures and integrate into mainstream American society?",a:"Assimilation Policy.",pts:300},
      {q:"The term 'test or device,' found in the Voting Rights Act, refers to any requirement that could prevent individuals from voting. Name one example of such a test.",a:"Literacy tests.",pts:400},
      {q:"Which legal case in 1973 resulted in the U.S. Supreme Court legalizing abortion, citing a woman's right to privacy under the Fourteenth Amendment?",a:"Roe v. Wade.",pts:500}
    ]
  },
  {
    cat:"New Feminism",
    qs:[
      {q:"Which 1963 book by Betty Friedan is often credited with sparking the second-wave feminist movement?",a:"The Feminine Mystique.",pts:100},
      {q:"Which organization, founded in 1966, was dedicated to achieving full equality for women, including support for the Equal Rights Amendment (ERA)?",a:"National Organization for Women (NOW).",pts:200},
      {q:"What term describes the movement in the 1960s and 1970s advocating for legal and social equality for women, including reproductive rights and workplace equality?",a:"Feminism (or Second-Wave Feminism).",pts:300},
      {q:"Which legal amendment, first proposed in 1923 and never ratified, aimed to ensure equal rights under the law, regardless of sex?",a:"Equal Rights Amendment (ERA).",pts:400},
      {q:"Which 1970s movement emphasized sexual liberation and reproductive rights, and was considered an integral part of the New Feminism?",a:"New Feminism (or the Women's Liberation Movement).",pts:500}
    ]
  },
  {
    cat:"Civil Rights",
    qs:[
      {q:"Which event in 1963 helped solidify Dr. Martin Luther King Jr.'s role in the Civil Rights Movement, where he delivered his famous 'I Have a Dream' speech?",a:"March on Washington.",pts:100},
      {q:"Which 1964 law prohibited discrimination based on race, color, religion, sex, or national origin, outlawing segregation in public places?",a:"Civil Rights Act of 1964.",pts:200},
      {q:"Which Native American organization, founded in 1944, aimed to protect and preserve Native American culture and promote political rights?",a:"National Congress of American Indians (NCAI).",pts:300},
      {q:"The 1973 occupation of Wounded Knee was a key event led by which Native American group, fighting for sovereignty and the recognition of treaties?",a:"American Indian Movement (AIM).",pts:400},
      {q:"Which landmark 1954 Supreme Court case ruled that racial segregation in public schools was unconstitutional, overturning 'separate but equal'?",a:"Brown v. Board of Education.",pts:500}
    ]
  }
];

let currentPts = 0;

function renderScores(){
  const el = document.getElementById('score-bar');
  el.innerHTML = TEAM_NAMES.map(t=>`
    <div class="score-card">
      <input class="score-name-input" value="${t}" onchange="renameTeam('${t}',this.value)" title="Click to rename team">
      <div class="score-val" id="sv-${t.replace(/\s/g,'_')}">${scores[t].toLocaleString()}</div>
      <div class="score-btns">
        <button onclick="adj('${t}',100)">+100</button>
        <button onclick="adj('${t}',-100)">-100</button>
      </div>
    </div>`).join('');
}

function renameTeam(old, nw){
  const val = scores[old];
  delete scores[old];
  const idx = TEAM_NAMES.indexOf(old);
  TEAM_NAMES[idx] = nw;
  scores[nw] = val;
  renderScores();
  renderBoard();
}

function adj(team, amt){
  scores[team] = Math.max(-99999, scores[team] + amt);
  const el = document.getElementById('sv-'+team.replace(/\s/g,'_'));
  if(el) el.textContent = scores[team].toLocaleString();
}

function renderBoard(){
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = 'repeat(4,1fr)';
  board.innerHTML = '';
  DATA.forEach(col=>{
    const h = document.createElement('div');
    h.className='cat-header';
    h.textContent=col.cat;
    board.appendChild(h);
  });
  for(let r=0;r<5;r++){
    DATA.forEach((col,c)=>{
      const q=col.qs[r];
      const key=`${c}-${r}`;
      const cell=document.createElement('div');
      if(used.has(key)){
        cell.className='cell used';
        cell.textContent='';
      } else {
        cell.className='cell'+(q.dd?' daily-double':'');
        cell.textContent='$'+q.pts;
        cell.onclick=()=>openQ(c,r,key,q,col.cat);
      }
      board.appendChild(cell);
    });
  }
}

function openQ(c,r,key,q,cat){
  used.add(key);
  renderBoard();
  currentPts = q.pts;
  document.getElementById('m-cat').textContent = cat;
  document.getElementById('m-pts').textContent = q.dd ? 'Daily Double — wager first!' : '$'+q.pts;
  document.getElementById('m-dd').style.display = q.dd ? 'block' : 'none';
  document.getElementById('m-q').textContent = q.q;
  document.getElementById('m-ans').textContent = 'Answer: '+q.a;
  document.getElementById('m-ans').classList.remove('show');
  const as = document.getElementById('award-section');
  as.innerHTML = `
    <div class="btn-section-label">Award / Deduct Points</div>
    <div class="btn-row" style="margin-bottom:6px">
      ${TEAM_NAMES.map(t=>`<button class="btn-correct" onclick="award('${t}',true)">+$${q.pts} ${t}</button>`).join('')}
    </div>
    <div class="btn-row">
      ${TEAM_NAMES.map(t=>`<button class="btn-wrong" onclick="award('${t}',false)">-$${q.pts} ${t}</button>`).join('')}
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

function revealAns(){
  document.getElementById('m-ans').classList.add('show');
}

function award(team, correct){
  scores[team] = Math.max(-99999, scores[team]+(correct?currentPts:-currentPts));
  const el = document.getElementById('sv-'+team.replace(/\s/g,'_'));
  if(el) el.textContent = scores[team].toLocaleString();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  if(used.size===20) showFinal();
}

function showFinal(){
  document.getElementById('board').style.display='none';
  document.getElementById('final-screen').style.display='block';
  const winner = TEAM_NAMES.reduce((a,b)=>scores[a]>=scores[b]?a:b);
  document.getElementById('winner-name').textContent = winner;
  document.getElementById('final-scores').innerHTML = TEAM_NAMES.map(t=>`
    <div class="final-sc">
      <div style="font-size:13px;color:#aac8ff;margin-bottom:4px;font-family:Arial,sans-serif">${t}</div>
      <div style="font-size:20px;font-weight:700;color:#FFD700;font-family:Arial,sans-serif">$${scores[t].toLocaleString()}</div>
    </div>`).join('');
}

function resetGame(){
  TEAM_NAMES.forEach(t=>scores[t]=0);
  used.clear();
  document.getElementById('board').style.display='grid';
  document.getElementById('final-screen').style.display='none';
  renderScores();
  renderBoard();
}

renderScores();
renderBoard();
</script>
</body>
</html>
